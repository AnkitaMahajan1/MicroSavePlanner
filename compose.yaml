services:
  business-logic:
    build: .
    image: blk-hacking-ind-ankita-mahajan
    container_name: hacking_container
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=5477
    ports:
      - "5477:5477"
    restart: always
  frontend:
    image: node:20-alpine
    container_name: selfsavings_frontend
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - .:/app
    ports:
      - "5173:5173"
    depends_on:
      - business-logic
    restart: always
  